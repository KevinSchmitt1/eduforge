# Assessment Approach Template
# ============================
# Define how the learner should be assessed (if at all).
# All fields optional; omit to skip assessment generation.
#
# Usage: forged build --topic "..." --assessment path/to/assessment.yaml

type:
  # What kind of assessment?
  # Options: project, knowledge_test, both, none
  # Examples:
  # - "project" → Build something; demonstrate understanding through code
  # - "knowledge_test" → Answer questions; demonstrate conceptual knowledge
  # - "both" → Combination of project + questions
  # - "none" → No assessment (just learning material)
  approach: "project"

difficulty:
  # How challenging should the assessment be?
  # Options: easy, medium, hard
  # Examples:
  # - "easy" → Check basic understanding; guided prompts
  # - "medium" → Moderate challenge; some open-endedness
  # - "hard" → Stretch goals; minimal guidance
  level: "medium"

for_project:
  # If type includes "project":
  # What should the learner build?
  # Examples:
  # - "Implement a hash map with collision resolution and test it"
  # - "Build a small LLM chatbot with local quantized model"
  # - "Design and deploy a multi-tier Kubernetes cluster"
  rubric: ""

for_test:
  # If type includes "knowledge_test":
  # What should be tested?
  # Examples:
  # - "Conceptual understanding of O(n) vs O(1) trade-offs"
  # - "Ability to debug and optimize code"
  # - "Knowledge of LLM architecture and limitations"
  focus: ""

success_criteria:
  # How will we know if the learner succeeded?
  # Examples:
  # - "Code passes all test cases; handles edge cases"
  # - "Correct answers to 80%+ of questions"
  # - "Project runs; can articulate trade-offs"
  criteria:
    - ""

time_estimate_minutes:
  # How long should the assessment take?
  # Examples: 30 (quick check-in), 120 (substantial project), 45 (standard test)
  estimate: 60
